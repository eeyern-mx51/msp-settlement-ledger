<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>POS Pay Plus — Settlement & Ledger UX Flows</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@keyframes slide-up { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.animate-slide-up { animation: slide-up 0.2s ease-out; }
body { margin:0; font-family: system-ui, -apple-system, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ═══════════════════════════════════════
   TAB 1: PAYOUT LIFECYCLE STATE MACHINE
   ═══════════════════════════════════════ */
const STATES = [
  { id:"ready_for_review", label:"Ready for\nReview", x:420, y:60, color:"#EEF2FF", border:"#818CF8", textColor:"#4338CA", description:"Starting state for a payout where mx51 owes money to the merchant.", entry:"Payout is prepared (automated daily job sweeps merchant balance to zero).", exits:["Approved → Ready for Transfer","Paused → Paused (reviewing)","Zero/negative balance → auto-Completed"] },
  { id:"ready_for_transfer", label:"Ready for\nTransfer", x:420, y:220, color:"#F0FDF4", border:"#86EFAC", textColor:"#166534", description:"Payment can be executed. Indicates the earliest execution time has been reached.", entry:"FinOps approves the payout after review.", exits:["Execute → Transferring","Paused → Paused (transferring)","Abandon → Abandoned"] },
  { id:"transferring", label:"Transferring", x:420, y:380, color:"#F5F3FF", border:"#C084FC", textColor:"#7C3AED", description:"Payout is being transferred to the merchant via NPP. Status MUST be set before the NPP request.", entry:"FinOps clicks Execute.", exits:["Success → Completed","Failure (transient) → Ready for Transfer","Failure (persistent) → Failed"] },
  { id:"completed", label:"Completed", x:620, y:380, color:"#F0FDF4", border:"#22C55E", textColor:"#166534", description:"Terminal state. Merchant has been paid, or payout amount was zero/negative (debt deferred).", entry:"NPP transfer succeeds, or payout amount ≤ 0 at approval.", exits:["Returned money → Failed (edge case)"] },
  { id:"failed", label:"Failed", x:420, y:540, color:"#FEF2F2", border:"#F87171", textColor:"#B91C1C", description:"Transfer failed. Distinguishes retryable (transient) from non-retryable (persistent) failures.", entry:"NPP transfer fails or completed transfer returned by bank.", exits:["Retryable → auto Ready for Transfer","Non-retryable → manual Ready for Transfer","Pause → Paused (transferring)"] },
  { id:"paused_reviewing", label:"Paused\n(reviewing)", x:180, y:60, color:"#FFFBEB", border:"#FBBF24", textColor:"#92400E", description:"Payout held during review stage. No progression until resumed or abandoned.", entry:"FinOps pauses from Ready for Review.", exits:["Resume → Ready for Review","Abandon → Abandoned"] },
  { id:"paused_transferring", label:"Paused\n(transferring)", x:180, y:220, color:"#FFFBEB", border:"#FBBF24", textColor:"#92400E", description:"Payout held during transfer stage. Prevents execution.", entry:"FinOps pauses from Ready for Transfer or Failed.", exits:["Resume → Ready for Transfer","Abandon → Abandoned"] },
  { id:"abandoned", label:"Abandoned", x:30, y:380, color:"#F9FAFB", border:"#9CA3AF", textColor:"#374151", description:"Terminal state. Payout will never be attempted. Merchant ledger entries released back to balance.", entry:"FinOps abandons from any Paused state.", exits:["None — terminal state"] },
];

function PayoutLifecycle() {
  const [selected, setSelected] = useState(null);
  return (
    <div className="p-8">
      <h2 className="text-xl font-bold text-gray-900 mb-1">Payout Lifecycle State Machine</h2>
      <p className="text-sm text-gray-500 mb-4">Click any state to see details. Solid lines = manual UI action. Dashed = automatic system transition.</p>
      <div className="flex gap-4 mb-4 text-xs">
        <div className="flex items-center gap-1.5"><div className="w-8 h-0.5 bg-indigo-600"></div><span className="text-gray-600">Manual (UI)</span></div>
        <div className="flex items-center gap-1.5"><div className="w-8 border-t-2 border-dashed border-emerald-500"></div><span className="text-gray-600">Automatic</span></div>
        <div className="flex items-center gap-1.5"><div className="w-5 h-4 rounded border-2 border-dashed border-amber-400 bg-amber-50"></div><span className="text-gray-600">Paused</span></div>
        <div className="flex items-center gap-1.5"><div className="w-5 h-4 rounded-full border-2 border-green-400 bg-green-50"></div><span className="text-gray-600">Terminal</span></div>
      </div>
      <div className="border border-gray-200 rounded-xl bg-gray-50 overflow-hidden">
        <svg viewBox="0 0 800 630" className="w-full" style={{maxHeight:480}}>
          <defs>
            <marker id="am" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#4F46E5"/></marker>
            <marker id="aa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#16A34A"/></marker>
            <marker id="ae" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#DC2626"/></marker>
            <marker id="aw" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#D97706"/></marker>
            <marker id="an" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#6B7280"/></marker>
          </defs>
          {/* Entry arrow */}
          <line x1={495} y1={20} x2={495} y2={54} stroke="#4F46E5" strokeWidth={2} markerEnd="url(#am)"/>
          <text x={505} y={38} fontSize="9" fill="#4F46E5" fontWeight="600">Prepare payout</text>
          {/* Review → Transfer */}
          <line x1={495} y1={124} x2={495} y2={214} stroke="#4F46E5" strokeWidth={1.5} markerEnd="url(#am)"/>
          <text x={505} y={172} fontSize="9" fill="#4F46E5" fontWeight="600">Approve</text>
          {/* Review ↔ Paused(R) */}
          <line x1={420} y1={76} x2={336} y2={76} stroke="#D97706" strokeWidth={1.5} markerEnd="url(#aw)"/>
          <text x={358} y={68} fontSize="9" fill="#D97706" fontWeight="600">Pause</text>
          <line x1={330} y1={100} x2={414} y2={100} stroke="#4F46E5" strokeWidth={1.5} markerEnd="url(#am)"/>
          <text x={348} y={114} fontSize="9" fill="#4F46E5" fontWeight="600">Resume</text>
          {/* Transfer → Transferring */}
          <line x1={495} y1={284} x2={495} y2={374} stroke="#4F46E5" strokeWidth={1.5} markerEnd="url(#am)"/>
          <text x={505} y={332} fontSize="9" fill="#4F46E5" fontWeight="600">Execute</text>
          {/* Transfer ↔ Paused(T) */}
          <line x1={420} y1={236} x2={336} y2={236} stroke="#D97706" strokeWidth={1.5} markerEnd="url(#aw)"/>
          <text x={358} y={228} fontSize="9" fill="#D97706" fontWeight="600">Pause</text>
          <line x1={330} y1={260} x2={414} y2={260} stroke="#4F46E5" strokeWidth={1.5} markerEnd="url(#am)"/>
          <text x={348} y={274} fontSize="9" fill="#4F46E5" fontWeight="600">Resume</text>
          {/* Transferring → Completed */}
          <line x1={570} y1={412} x2={614} y2={412} stroke="#16A34A" strokeWidth={1.5} markerEnd="url(#aa)" strokeDasharray="4 2"/>
          <text x={576} y={402} fontSize="9" fill="#16A34A" fontWeight="600">Success</text>
          {/* Transferring → Failed */}
          <line x1={495} y1={444} x2={495} y2={534} stroke="#DC2626" strokeWidth={1.5} markerEnd="url(#ae)" strokeDasharray="4 2"/>
          <text x={505} y={492} fontSize="9" fill="#DC2626" fontWeight="600">Failure</text>
          {/* Transferring → Ready for Transfer (retryable) */}
          <path d="M 420,400 C 380,400 380,270 420,262" fill="none" stroke="#D97706" strokeWidth={1.5} markerEnd="url(#aw)" strokeDasharray="4 2"/>
          <text x={350} y={340} fontSize="8" fill="#D97706" fontWeight="600">Retryable</text>
          {/* Failed → Ready for Transfer */}
          <path d="M 570,560 C 680,560 680,262 570,252" fill="none" stroke="#4F46E5" strokeWidth={1.5} markerEnd="url(#am)"/>
          <text x={688} y={400} fontSize="8" fill="#4F46E5" fontWeight="600" transform="rotate(90,688,400)">Resolve & retry</text>
          {/* Failed → Paused(T) */}
          <path d="M 420,560 C 300,560 260,290 255,288" fill="none" stroke="#D97706" strokeWidth={1.5} markerEnd="url(#aw)"/>
          <text x={290} y={440} fontSize="8" fill="#D97706" fontWeight="600">Pause</text>
          {/* Completed → Failed */}
          <path d="M 695,444 C 695,520 580,540 575,540" fill="none" stroke="#DC2626" strokeWidth={1.5} markerEnd="url(#ae)" strokeDasharray="4 2"/>
          <text x={660} y={504} fontSize="8" fill="#DC2626" fontWeight="600">Bank return</text>
          {/* Review → Completed (zero) */}
          <path d="M 570,92 C 750,92 750,380 770,396" fill="none" stroke="#16A34A" strokeWidth={1.5} markerEnd="url(#aa)" strokeDasharray="4 2"/>
          <text x={720} y={200} fontSize="8" fill="#16A34A" fontWeight="600" transform="rotate(90,720,200)">Zero / neg balance</text>
          {/* Paused → Abandoned */}
          <line x1={180} y1={124} x2={105} y2={374} stroke="#6B7280" strokeWidth={1.5} markerEnd="url(#an)"/>
          <text x={110} y={240} fontSize="8" fill="#6B7280" fontWeight="600" transform="rotate(75,110,240)">Abandon</text>
          <line x1={180} y1={260} x2={105} y2={374} stroke="#6B7280" strokeWidth={1.5} markerEnd="url(#an)"/>
          <text x={118} y={320} fontSize="8" fill="#6B7280" fontWeight="600" transform="rotate(50,118,320)">Abandon</text>
          {/* State nodes */}
          {STATES.map(s => {
            const lines = s.label.split("\n");
            const isTerminal = s.id==="completed"||s.id==="abandoned";
            return (
              <g key={s.id} onClick={()=>setSelected(s)} className="cursor-pointer">
                <rect x={s.x} y={s.y} width={150} height={64} rx={isTerminal?32:10} fill={s.color} stroke={selected?.id===s.id?"#1E1E1E":s.border} strokeWidth={selected?.id===s.id?2.5:1.5} strokeDasharray={s.id.startsWith("paused")?"6 3":"none"}/>
                {lines.map((l,i)=><text key={i} x={s.x+75} y={s.y+(lines.length===1?37:28+i*18)} textAnchor="middle" fill={s.textColor} fontSize="12" fontWeight="600" fontFamily="system-ui">{l}</text>)}
              </g>
            );
          })}
        </svg>
      </div>
      {selected && (
        <div className="mt-4 bg-white border border-gray-200 rounded-xl p-5 shadow-sm animate-slide-up">
          <div className="flex items-center gap-3 mb-2">
            <div className="w-3 h-3 rounded-full" style={{backgroundColor:selected.border}}/>
            <h3 className="text-lg font-bold" style={{color:selected.textColor}}>{selected.label.replace("\n"," ")}</h3>
            {(selected.id==="completed"||selected.id==="abandoned")&&<span className="text-xs font-semibold px-2 py-0.5 rounded-full bg-gray-100 text-gray-500">Terminal</span>}
          </div>
          <p className="text-sm text-gray-600 mb-3">{selected.description}</p>
          <div className="grid grid-cols-2 gap-4">
            <div><h4 className="text-xs font-bold text-gray-500 uppercase mb-1">Entry condition</h4><p className="text-sm text-gray-700">{selected.entry}</p></div>
            <div><h4 className="text-xs font-bold text-gray-500 uppercase mb-1">Transitions</h4><ul className="space-y-0.5">{selected.exits.map((e,i)=><li key={i} className="text-sm text-gray-700">→ {e}</li>)}</ul></div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   TAB 2: END-TO-END JOURNEY
   ═══════════════════════════════════════ */
const E2E_STEPS = [
  { id:1, phase:"Ingestion", title:"DTE file pushed by Cuscal", actor:"Cuscal → MSP", type:"auto", desc:"Daily Transaction Extract file pushed to S3 and ingested.", ui:false, details:["Settlement date cutover at 5AM Sydney","File types: DTE, IFR, SSR, SFR"] },
  { id:2, phase:"Ingestion", title:"Transactions enriched with MSF", actor:"MSP (automatic)", type:"auto", desc:"Transactions enriched with Merchant Service Fee. MSF = Transaction amount × MSF rate (%).", ui:false, details:["POS Revenue = MSF − mx51 margin − Interchange − Scheme fee"] },
  { id:3, phase:"Ledger", title:"Merchant balance updated", actor:"MSP (automatic)", type:"auto", desc:"Balance Transaction (BT) entries created. Sum of all BTs = amount mx51 owes merchant.", ui:false, details:["BT is immutable","Types: transaction, adjustment, payout_transfer"] },
  { id:4, phase:"Ledger", title:"Adjustments affect balance", actor:"FinOps T1 / System", type:"both", desc:"Ad-hoc corrections (chargebacks, goodwill credits, fee corrections). Manual adjustments require 2nd approval.", ui:true, uiLabel:"Create adjustment, Approve adjustment", details:["Manual: FinOps-created, requires approval","Auto: system corrections (scheme fee rebates)","Internal note + merchant-visible description"] },
  { id:5, phase:"Payout Prep", title:"Prepare payout (daily job)", actor:"MSP (automated cron)", type:"auto", desc:"Sweeps merchant balance to zero. Creates payout records by assigning payout_id to unassigned BT entries.", ui:true, uiLabel:"Prepare payout (date range)", details:["Zero/negative → auto-completed (debt deferred)","Selection criteria: settlement date + effective_ts cutoffs"] },
  { id:6, phase:"Review", title:"FinOps reviews & approves", actor:"FinOps T1 (manual)", type:"manual", desc:"Validate payout amounts against expected DTE sums. Approve moves to Ready for Transfer.", ui:true, uiLabel:"Approve, Pause, Abandon payout", details:["POC: fully manual review","Pilot: auto-approve with pre-defined criteria","Can pause or abandon if issues found"] },
  { id:7, phase:"Transfer", title:"Execute payout transfer", actor:"FinOps T1 / Automated", type:"both", desc:"Triggers NPP payment to merchant's bank account. Status set to Transferring before NPP request.", ui:true, uiLabel:"Execute payout (transfer)", details:["POC: manual per-merchant","Pilot/BAU: automated (5d vs 7d criteria)","All attempts logged"] },
  { id:8, phase:"Transfer", title:"Track transfer status", actor:"MSP (automatic)", type:"auto", desc:"NPP webhooks track outcome. Failures categorised as transient (retryable) or persistent (non-retryable).", ui:true, uiLabel:"View transfer status, failure reporting", details:["Success → Completed + BT entry","Transient → auto-retry","Persistent → Failed + alert raised"] },
];
const PHASE_C = { Ingestion:"#818CF8", Ledger:"#86EFAC", "Payout Prep":"#FBBF24", Review:"#C084FC", Transfer:"#F87171" };
const PHASE_BG = { Ingestion:"#EEF2FF", Ledger:"#F0FDF4", "Payout Prep":"#FFFBEB", Review:"#F5F3FF", Transfer:"#FEF2F2" };

function E2EJourney() {
  const [expanded, setExpanded] = useState(null);
  return (
    <div className="p-8">
      <h2 className="text-xl font-bold text-gray-900 mb-1">Merchant Transaction → Payout Journey</h2>
      <p className="text-sm text-gray-500 mb-6">End-to-end flow from Cuscal DTE ingestion to merchant payout via NPP. Click to expand.</p>
      <div className="flex gap-3 mb-4 text-xs">
        {["Ingestion","Ledger","Payout Prep","Review","Transfer"].map(p=><span key={p} className="px-2.5 py-1 rounded-lg font-semibold" style={{backgroundColor:PHASE_BG[p],color:PHASE_C[p],border:`1px solid ${PHASE_C[p]}30`}}>{p}</span>)}
      </div>
      <div className="relative">
        {E2E_STEPS.map((step,i)=>{
          const isExp = expanded===step.id;
          const dotColor = step.type==="auto"?"#22C55E":step.type==="manual"?"#818CF8":"#FBBF24";
          return (
            <div key={step.id} className="relative flex gap-4 pb-1">
              <div className="flex flex-col items-center flex-shrink-0 w-8">
                <div className="w-5 h-5 rounded-full border-2 flex items-center justify-center text-[10px] font-bold" style={{borderColor:dotColor,backgroundColor:dotColor+"20",color:dotColor}}>{step.id}</div>
                {i<E2E_STEPS.length-1&&<div className="w-px flex-1 bg-gray-200 mt-1"/>}
              </div>
              <div className={`flex-1 mb-3 rounded-xl border cursor-pointer transition-all ${isExp?"shadow-md":""}`} style={{borderColor:isExp?PHASE_C[step.phase]:"#E5E7EB",backgroundColor:isExp?PHASE_BG[step.phase]+"80":"white"}} onClick={()=>setExpanded(isExp?null:step.id)}>
                <div className="px-4 py-3">
                  <div className="flex items-center gap-2 mb-0.5">
                    <span className="text-[10px] font-bold px-1.5 py-0.5 rounded" style={{backgroundColor:PHASE_BG[step.phase],color:PHASE_C[step.phase],border:`1px solid ${PHASE_C[step.phase]}30`}}>{step.phase}</span>
                    <span className="text-sm font-bold text-gray-900">{step.title}</span>
                    {step.ui&&<span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-200">UI</span>}
                  </div>
                  <p className="text-xs text-gray-500">{step.actor}</p>
                </div>
                {isExp&&(
                  <div className="px-4 pb-3 pt-2 border-t space-y-2 animate-slide-up" style={{borderColor:PHASE_C[step.phase]+"20"}}>
                    <p className="text-sm text-gray-700">{step.desc}</p>
                    {step.uiLabel&&<div className="text-xs bg-indigo-50 rounded-lg px-3 py-1.5 border border-indigo-100"><span className="font-bold text-indigo-700">UI: </span><span className="text-indigo-600">{step.uiLabel}</span></div>}
                    <ul className="space-y-0.5">{step.details.map((d,j)=><li key={j} className="text-xs text-gray-600 flex gap-1.5"><span className="text-gray-400">•</span>{d}</li>)}</ul>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   TAB 3: FINOPS ACTION FLOWS
   ═══════════════════════════════════════ */
const FLOWS = {
  approve: { title:"Approve Payout", icon:"✓", color:"#4F46E5", bg:"#EEF2FF", pre:"Ready for Review", role:"FinOps T1", transition:"Ready for Review → Ready for Transfer (or Completed if ≤0)", steps:[
    {a:"FinOps T1",t:"Review payout summary",d:"Validate amount against DTE sums. Check merchant, MID, transfers."},
    {a:"FinOps T1",t:"Click Approve",d:"Opens confirmation dialog with payout summary."},
    {a:"FinOps T1",t:"Confirm",d:"1.2s loading state while processing."},
    {a:"System",t:"Process",d:"Amount > 0 → Ready for Transfer. Amount ≤ 0 → Completed (debt deferred)."},
    {a:"System",t:"Audit log",d:"Records approval with user and timestamp."},
    {a:"UI",t:"Toast",d:"Success: 'Payout approved — now ready for transfer.'"},
  ], notes:["Zero balance → auto-complete","Negative → debt_deferred + debt_rollover adjustments","POC: manual. Pilot: auto-criteria with manual override"] },
  pause: { title:"Pause Payout", icon:"⏸", color:"#D97706", bg:"#FFFBEB", pre:"Ready for Review, Ready for Transfer, or Failed", role:"FinOps T1", transition:"→ Paused (reviewing) or Paused (transferring)", steps:[
    {a:"FinOps T1",t:"Click Pause",d:"Opens dialog: 'Payout will remain paused until resumed or abandoned.'"},
    {a:"FinOps T1",t:"Select reason (required)",d:"Options: merchant verification, suspicious activity, bank details, regulatory, audit, other."},
    {a:"FinOps T1",t:"Add note (optional)",d:"Free text, 300 chars. Internal context for FinOps team."},
    {a:"FinOps T1",t:"Confirm",d:"1s loading state."},
    {a:"System",t:"Process",d:"Status → Paused (reviewing) or Paused (transferring) depending on source."},
    {a:"UI",t:"Toast",d:"Warning: 'Payout paused — {reason}.'"},
  ], notes:["Must pause before abandoning (intentional friction)","Blocks all auto-approve/auto-transfer","Reason and note captured in audit log"] },
  abandon: { title:"Abandon Payout", icon:"⊘", color:"#DC2626", bg:"#FEF2F2", pre:"Paused (reviewing) or Paused (transferring)", role:"FinOps T1", transition:"→ Abandoned (terminal, irreversible)", steps:[
    {a:"FinOps T1",t:"Click Abandon",d:"Destructive dialog with red warning: 'This action is irreversible.'"},
    {a:"FinOps T1",t:"Review impact",d:"Red panel: payout ID, merchant, amount at risk, transfers affected."},
    {a:"FinOps T1",t:"Select reason (required)",d:"Options: duplicate, account closed, fraud, incorrect calc, merchant request, other."},
    {a:"FinOps T1",t:'Type "ABANDON"',d:"Destructive action safeguard. Case-insensitive confirmation."},
    {a:"FinOps T1",t:"Confirm",d:"1.5s loading (longer for gravity of action)."},
    {a:"System",t:"Process",d:"Remove payout_id from BT entries. Set amount to zero. Funds return to balance."},
    {a:"UI",t:"Toast + navigate",d:"Error: 'Payout abandoned — permanently cancelled.' Returns to list."},
  ], notes:["ONLY from paused states (must pause first)","Terminal — no further actions","BT entries released for next payout","May need adjustment for offset calculations"] },
  execute: { title:"Execute (Transfer)", icon:"▶", color:"#7C3AED", bg:"#F5F3FF", pre:"Ready for Transfer", role:"FinOps T1", transition:"→ Transferring → Completed / Failed", steps:[
    {a:"FinOps T1",t:"Click Execute",d:"Immediate — no confirmation dialog."},
    {a:"System",t:"Set Transferring",d:"Status MUST be set before NPP request."},
    {a:"System",t:"Send via NPP",d:"Payout Service → Cuscal Payment API → NPP."},
    {a:"System",t:"Await webhook",d:"NPP webhook or Recover Status endpoint."},
    {a:"System",t:"Record outcome",d:"Success → Completed. Transient → retry. Persistent → Failed + alert."},
  ], notes:["Kill switch blocks execution","POC: per-merchant manual","Future: multi-select / trigger all"] },
  resume: { title:"Resume Payout", icon:"▶", color:"#059669", bg:"#F0FDF4", pre:"Paused (reviewing) or Paused (transferring)", role:"FinOps T1", transition:"→ Ready for Review or Ready for Transfer", steps:[
    {a:"FinOps T1",t:"Click Resume",d:"Immediate — no confirmation needed."},
    {a:"System",t:"Restore state",d:"Paused (R) → Ready for Review. Paused (T) → Ready for Transfer."},
    {a:"UI",t:"Toast",d:"Success: 'Payout resumed.'"},
  ], notes:["Re-enables all actions for target state","Auto-criteria may immediately re-trigger"] },
};

function ActionFlows() {
  const [active, setActive] = useState("approve");
  const f = FLOWS[active];
  return (
    <div className="p-8">
      <h2 className="text-xl font-bold text-gray-900 mb-1">FinOps Payout Action Flows</h2>
      <p className="text-sm text-gray-500 mb-4">Step-by-step interaction flows for each payout action.</p>
      <div className="flex gap-2 mb-6 flex-wrap">
        {Object.keys(FLOWS).map(k=>{const fl=FLOWS[k];return(
          <button key={k} onClick={()=>setActive(k)} className="flex items-center gap-1.5 text-sm font-semibold px-3 py-1.5 rounded-lg border transition-all" style={{backgroundColor:active===k?fl.color:"white",color:active===k?"white":fl.color,borderColor:active===k?fl.color:fl.color+"40"}}><span>{fl.icon}</span> {fl.title}</button>
        );})}
      </div>
      <div className="rounded-xl border overflow-hidden" style={{borderColor:f.color+"30"}}>
        <div className="px-5 py-4" style={{backgroundColor:f.bg}}>
          <h3 className="text-lg font-bold mb-2" style={{color:f.color}}>{f.icon} {f.title}</h3>
          <div className="grid grid-cols-3 gap-3 text-sm">
            <div><span className="text-xs font-bold text-gray-500 uppercase">Precondition</span><p className="text-gray-700 mt-0.5">{f.pre}</p></div>
            <div><span className="text-xs font-bold text-gray-500 uppercase">Role</span><p className="text-gray-700 mt-0.5">{f.role}</p></div>
            <div><span className="text-xs font-bold text-gray-500 uppercase">Transition</span><p className="text-gray-700 mt-0.5 font-mono text-xs">{f.transition}</p></div>
          </div>
        </div>
        <div className="px-5 py-4">
          {f.steps.map((s,i)=>{
            const ac=s.a==="System"?"#16A34A":s.a==="UI"?"#7C3AED":f.color;
            return(
              <div key={i} className="flex gap-3 pb-3 last:pb-0">
                <div className="flex flex-col items-center flex-shrink-0">
                  <div className="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold text-white" style={{backgroundColor:ac}}>{i+1}</div>
                  {i<f.steps.length-1&&<div className="w-px flex-1 mt-1" style={{backgroundColor:ac+"30"}}/>}
                </div>
                <div className="flex-1 pb-1">
                  <div className="flex items-center gap-2"><span className="text-[10px] font-bold uppercase px-1.5 py-0.5 rounded" style={{backgroundColor:ac+"15",color:ac}}>{s.a}</span><span className="text-sm font-bold text-gray-900">{s.t}</span></div>
                  <p className="text-sm text-gray-600 mt-0.5">{s.d}</p>
                </div>
              </div>
            );
          })}
        </div>
        <div className="px-5 py-3 border-t" style={{backgroundColor:f.bg+"60",borderColor:f.color+"15"}}>
          <h4 className="text-xs font-bold text-gray-500 uppercase mb-1.5">Edge cases</h4>
          <ul className="space-y-0.5">{f.notes.map((n,i)=><li key={i} className="text-sm text-gray-600 flex gap-2"><span className="text-gray-400">⚠</span>{n}</li>)}</ul>
        </div>
      </div>
    </div>
  );
}
